# rule.yml
rule.endpointRules:
  echo@call:
    req-acc:
      - allow-role-based-access-control.lightapi.net.dev.lightapi.net
    permission:
      roles: mcp-reader
  /v1/pets@get:
    req-acc:
      - allow-role-based-access-control.lightapi.net.dev.lightapi.net
    permission:
      roles: host-admin
  /v1/pets@post:
    permission: {}
  /v1/streams@get:
    permission: {}
  /v1/accounts@get:
    req-acc:
      - allow-role-based-access-control.lightapi.net.dev.lightapi.net
    res-fil:
      - response-column-filter.lightapi.net.dev.lightapi.net
      - response-row-filter.lightapi.net.dev.lightapi.net
    permission:
      col:
        role:
          teller: '["accountNo","userId","accountType","firstName","lastName"]'
          account-manager: '["accountNo","userId","accountType","firstName","lastName","status"]'
      row:
        role:
          teller:
            - colName: accountType
              colValue: C
              operator: =
      roles: account-manager teller
  /v1/flowers@post:
    permission: {}
  /v1/accounts@post:
    req-acc:
      - allow-role-based-access-control.lightapi.net.dev.lightapi.net
    permission:
      roles: host-admin
  /v1/documents@get:
    permission: {}
  '/v1/pets/{petId}@get':
    permission: {}
  '/v1/pets/{petId}@put':
    permission: {}
  getRandomNumber@call:
    req-acc:
      - allow-role-based-access-control.lightapi.net.dev.lightapi.net
    permission:
      roles: mcp-reader mcp-writer
  /v1/notifications@get:
    permission: {}
  '/v1/pets/{petId}@delete':
    permission: {}
  '/v1/accounts/{accountNo}@get':
    permission: {}
  '/v1/accounts/{accountNo}@put':
    permission: {}
  fetch_generic_url_content@call:
    permission: {}
  fetch_networknt_site_docs@call:
    permission: {}
  '/v1/accounts/{accountNo}@delete':
    req-acc:
      - allow-role-based-access-control.lightapi.net.dev.lightapi.net
    permission: {}
  search_networknt_site_code@call:
    permission: {}
  search_networknt_site_docs@call:
    req-acc:
      - allow-role-based-access-control.lightapi.net.dev.lightapi.net
    permission:
      roles: github-reader
rule.ruleBodies:
  response-row-filter.lightapi.net.dev.lightapi.net:
    common: 'Y'
    hostId: 01964b05-552a-7c4b-9184-6857e7f3dc5f
    ruleId: response-row-filter.lightapi.net.dev.lightapi.net
    actions:
      - actionId: row-filter-action
        actionDesc: Invoke the action to filter the response body
        actionClassName: com.networknt.rule.ResponseRowFilterAction
        conditionResult: false
    ruleName: 'Response row filter based on role, group, position, attribute and user'
    ruleType: res-fil
    ruleOwner: 01964b05-5532-7c79-8cde-191dcbd421b8
    conditions:
      - index: 1
        conditionId: row-is-not-null
        operatorCode: isNotNull
        propertyPath: row
        conditionDesc: row object is in the objMap in the rule input
    ruleVersion: 1.0.0
  response-column-filter.lightapi.net.dev.lightapi.net:
    common: 'Y'
    hostId: 01964b05-552a-7c4b-9184-6857e7f3dc5f
    ruleId: response-column-filter.lightapi.net.dev.lightapi.net
    actions:
      - actionId: col-filter-action
        actionDesc: Invoke the action to filter the response body
        actionClassName: com.networknt.rule.ResponseColumnFilterAction
        conditionResult: false
    ruleName: 'Response column filter based on role, group, position, attribute and user'
    ruleType: res-fil
    ruleOwner: 01964b05-5532-7c79-8cde-191dcbd421b8
    conditions:
      - index: 1
        conditionId: col-is-not-null
        operatorCode: isNotNull
        propertyPath: col
        conditionDesc: col object is in the objMap in the rule input
    ruleVersion: 1.0.0
  allow-role-based-access-control.lightapi.net.dev.lightapi.net:
    common: 'Y'
    hostId: 01964b05-552a-7c4b-9184-6857e7f3dc5f
    ruleId: allow-role-based-access-control.lightapi.net.dev.lightapi.net
    actions:
      - actionId: role-based-access-control-action
        actionDesc: Call action to verify the role claim
        actionValues:
          - value: $roles
            actionValueId: permission-roles
            valueTypeCode: STRING
        actionClassName: com.networknt.rule.RoleBasedAccessControlAction
        conditionResult: false
    ruleDesc: >-
      If the token has role claim, then at least one role in the JWT role claim
      matches the endpoint permission roles configuration.
    ruleName: Role-Based Access Control for authorization code token.
    ruleType: req-acc
    ruleOwner: 01964b05-5532-7c79-8cde-191dcbd421b8
    conditions:
      - index: 1
        conditionId: role-is-not-null
        operatorCode: isNotNull
        propertyPath: auditInfo.subject_claims.ClaimsMap.role
        conditionDesc: >-
          role in the claim map is not null indicate the token has a role claim.
          Match it with the endpoint permission with the action.
    ruleVersion: 1.0.0

# mcp-router.yml
mcp-router.tools:
  - name: echo
    path: /mcp
    method: call
    apiType: mcp
    endpoint: echo@call
    protocol: http
    serviceId: com.networknt.local.mcp-1.0.0
    description: Echoes back the input
    inputSchema:
      type: object
      required:
        - message
      properties:
        message:
          type: string
    toolMetadata:
      read_only: false
      destructive: false
  - name: getRandomNumber
    path: /mcp
    method: call
    apiType: mcp
    endpoint: getRandomNumber@call
    protocol: http
    serviceId: com.networknt.local.mcp-1.0.0
    description: Returns a random number between min and max
    inputSchema:
      type: object
      required:
        - min
        - max
      properties:
        max:
          type: integer
        min:
          type: integer
    toolMetadata:
      read_only: false
      destructive: false
  - name: listProducts
    path: '/v1/market/{store}/products'
    method: get
    apiType: openapi
    endpoint: '/v1/market/{store}/products@get'
    protocol: https
    serviceId: com.networknt.market-1.0.0
    description: Get all products from stores
    inputSchema:
      type: object
      required:
        - store
      properties:
        limit:
          type: integer
          format: int32
          description: How many items to return at one time (max 100)
        store:
          type: string
          description: The downstream store name
  - name: search_networknt_site_docs
    path: /networknt/networknt-site
    method: call
    apiType: mcp
    endpoint: search_networknt_site_docs@call
    protocol: https
    serviceId: com.networknt.mcp.github.nnts-1.0.0
    description: >-
      Semantically search within the fetched documentation from GitHub
      repository: networknt/networknt-site. Useful for specific queries.
    inputSchema:
      type: object
      $schema: 'http://json-schema.org/draft-07/schema#'
      required:
        - query
      properties:
        query:
          type: string
          description: The search query to find relevant documentation
      additionalProperties: false
    toolMetadata:
      read_only: false
      destructive: false
  - name: fetch_generic_url_content
    path: /networknt/networknt-site
    method: call
    apiType: mcp
    endpoint: fetch_generic_url_content@call
    protocol: https
    serviceId: com.networknt.mcp.github.nnts-1.0.0
    description: >-
      Generic tool to fetch content from any absolute URL, respecting robots.txt
      rules. Use this to retrieve referenced urls (absolute urls) that were
      mentioned in previously fetched documentation.
    inputSchema:
      type: object
      $schema: 'http://json-schema.org/draft-07/schema#'
      required:
        - url
      properties:
        url:
          type: string
          description: The URL of the document or page to fetch
      additionalProperties: false
    toolMetadata:
      read_only: false
      destructive: false
  - name: fetch_networknt_site_docs
    path: /networknt/networknt-site
    method: call
    apiType: mcp
    endpoint: fetch_networknt_site_docs@call
    protocol: https
    serviceId: com.networknt.mcp.github.nnts-1.0.0
