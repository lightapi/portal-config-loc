---
services:

  controller:
    image: networknt/controller-rs:latest
    ports:
      - 8438:8438
    volumes:
      - ./light-controller-rust:/keystore:ro,z
    environment:
      CONTROLLER_ADDR: 0.0.0.0:8438
      CONTROLLER_HOST_ID: 01964b05-552a-7c4b-9184-6857e7f3dc5f
      CONTROLLER_USER_ID: 01964b05-5532-7c79-8cde-191dcbd421b8
      CONTROLLER_TLS_CERT_PATH: /keystore/server.pem
      CONTROLLER_TLS_KEY_PATH: /keystore/server.key
      CONTROLLER_TLS_TRUST_CERT_PATH: /keystore/server.pem
      DATABASE_URL: postgres://postgres:secret@postgres:5432/configserver
      DATABASE_MAXIMUM_POOL_SIZE: 3
      MICROSERVICE_JWKS_URL: https://light-oauth:6881/oauth2/AZZRJE52eXu3t1hseacnGQ/keys
      MICROSERVICE_JWKS_VERIFY_HOSTNAME: "false"
      MICROSERVICE_JWT_AUDIENCE: urn:com.networknt
      RUST_LOG: "${RUST_LOG:-debug}"
      CONTROLLER_LOG_ANSI: "false"
    hostname: controller
    container_name: controller
    depends_on:
      postgres:
        condition: service_healthy
      light-oauth:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -k -f https://localhost:8438/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  light-oauth:
    image: ${LIGHT_OAUTH_IMAGE:-networknt/light-oauth:2.2.1}
    ports:
      - 6881:6881
      # - 5005:5005
    volumes:
      - ./light-oauth-rust/config:/config:Z
    environment:
      LIGHT_RS_CONFIG_DIR: /config
      # The following environment variable will enable the debug in the container.
      RUST_LOG: "${RUST_LOG:-debug}"
      OAUTH_LOG_ANSI: "false"
    # restart: on-failure
    hostname: light-oauth
    container_name: light-oauth
    depends_on:
      postgres:
        condition: service_healthy

  config-server:
    image: ${CONFIG_SERVER_IMAGE:-networknt/config-server:2.2.1}
    ports:
      - 8435:8435
    volumes:
      - ./config-server-rust/config:/config:Z
    environment:
      LIGHT_RS_CONFIG_DIR: /config
      # The following environment variable will enable the debug in the container.
      RUST_LOG: "${RUST_LOG:-debug}"
      CONFIG_LOG_ANSI: "false"
    # restart: on-failure
    hostname: config-server
    container_name: config-server
    depends_on:
      postgres:
        condition: service_healthy
      controller:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  portal-service:
    image: ${PORTAL_SERVICE_IMAGE:-networknt/portal-service:2.2.1}
    ports:
      - 2498:2498
    volumes:
      - ./portal-service-rust/config:/config:Z
      - ${PORTAL_DATA_DIR:-./data}:/data
    environment:
      LIGHT_RS_CONFIG_DIR: /config
      # The following environment variable will enable the debug in the container.
      RUST_LOG: "${RUST_LOG:-debug}"
      PORTAL_LOG_ANSI: "false"
    # restart: on-failure
    hostname: portal-service
    container_name: portal-service
    networks:
      default:
        aliases:
          - reference
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  light-agent:
    image: ${LIGHT_AGENT_IMAGE:-networknt/light-agent:latest}
    ports:
      - ${LIGHT_AGENT_PORT:-8083}:8083
    volumes:
      - ./light-agent-rust/config:/config:ro,Z
      - ./light-controller-rust/ca.pem:/keystore/ca.pem:ro,z
    environment:
      LIGHT_RS_CONFIG_DIR: /config
      DATABASE_URL: postgres://postgres:secret@postgres:5432/configserver
      LIGHT_PORTAL_AUTHORIZATION: "${LIGHT_AGENT_LIGHT_PORTAL_AUTHORIZATION:-Bearer eyJraWQiOiJBWnAwMk1DdWNydVpmRkpieXlGd3VnIiwiYWxnIjoiUlMyNTYifQ..XcZEkr_fD1U3IWRYs9BS7aYVlcrj7zlayPjZ8s9_5MCTN2CYwIMuW1t_a7U_eRUTn3UtjRbV0v7tKBZ53sDIKbn3de6RJ4o_Iynf2_WX-yHEoggljkF-blIo8HarF1sn_v4Fp1eEh7V8m6D_lHC9FVkkIFDSvKl5GPAgjd9-dq8AkIkOGJ26IAOeuiKIskpUNkCmu6wahGInDYdsYk0GTydLu2jYIkhcPOoAOgFpQXBIPVXFZ8C1CRpPw39gfPyyATP_1qh2iGXlfSGTJiIp0pb9EXLIVcexPhdGh_LhSkrOMDUqxme5HC94T9do8yPQGzgfNFPcLywVeTgEco4bBQ}"
      LIGHT_AGENT_HOST_ID: "${LIGHT_AGENT_HOST_ID:-01964b05-552a-7c4b-9184-6857e7f3dc5f}"
      LIGHT_AGENT_AGENT_DEF_ID: "${LIGHT_AGENT_AGENT_DEF_ID:-}"
      CODEX_API_KEY: "${CODEX_API_KEY:-}"
      CODEX_ACCOUNT_ID: "${CODEX_ACCOUNT_ID:-}"
      CODEX_REASONING_EFFORT: "${CODEX_REASONING_EFFORT:-low}"
      LIGHT_AGENT_MODEL: "${LIGHT_AGENT_MODEL:-gpt-5.5}"
      LIGHT_AGENT_TEMPERATURE: "${LIGHT_AGENT_TEMPERATURE:-0.7}"
      RUST_LOG: "${LIGHT_AGENT_RUST_LOG:-info}"
      AGENT_LOG_ANSI: "false"
    hostname: light-agent
    container_name: light-agent
    depends_on:
      postgres:
        condition: service_healthy
      controller:
        condition: service_healthy
      config-server:
        condition: service_healthy
      hybrid-query1:
        condition: service_started
      light-gateway:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
