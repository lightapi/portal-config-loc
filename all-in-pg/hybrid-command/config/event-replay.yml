# Event replay Phase 1 contract. Runtime behavior remains disabled until the
# corresponding later-phase gate is implemented and approved.
contractVersion: event-replay-v1
policyRegistryVersion: event-replay-policy-v1
limitPolicyVersion: event-replay-limits-v1
approvalPolicyVersion: event-replay-approval-v1

featureGates:
  captureEnabled: ${event-replay.captureEnabled:false}
  kafkaPublicationEnabled: ${event-replay.kafkaPublicationEnabled:false}
  planningEnabled: ${event-replay.planningEnabled:false}
  rollbackDryRunEnabled: ${event-replay.rollbackDryRunEnabled:false}
  executionEnabled: ${event-replay.executionEnabled:false}
  breakGlassReleaseEnabled: ${event-replay.breakGlassReleaseEnabled:false}

rollout:
  # DISABLED is the shipped default. Use ALLOWLIST for canaries and ALL only
  # after the Phase 11 expansion gate has passed.
  mode: ${event-replay.rolloutMode:DISABLED}
  sourceProcessors: ${event-replay.rolloutSourceProcessors:}
  projectionNames: ${event-replay.rolloutProjectionNames:}
  consumerGroups: ${event-replay.rolloutConsumerGroups:}
  hostIds: ${event-replay.rolloutHostIds:}
  changeTicket: ${event-replay.rolloutChangeTicket:}


limits:
  maxTransactionsPerPlan: ${event-replay.maxTransactionsPerPlan:500}
  maxEventsPerPlan: ${event-replay.maxEventsPerPlan:5000}
  maxEncryptedBytesPerTransaction: ${event-replay.maxEncryptedBytesPerTransaction:16777216}
  maxDecryptedBytesPerTransaction: ${event-replay.maxDecryptedBytesPerTransaction:16777216}
  maxEncryptedBytesPerPlan: ${event-replay.maxEncryptedBytesPerPlan:268435456}
  maxDecryptedBytesPerPlan: ${event-replay.maxDecryptedBytesPerPlan:268435456}
  maxPlanningSeconds: ${event-replay.maxPlanningSeconds:30}
  maxPauseAcknowledgementSeconds: ${event-replay.maxPauseAcknowledgementSeconds:60}
  maxExecutionSeconds: ${event-replay.maxExecutionSeconds:1800}
  maxAttemptsPerTransaction: ${event-replay.maxAttemptsPerTransaction:3}
  planTtlSeconds: ${event-replay.planTtlSeconds:86400}
  workerLeaseSeconds: ${event-replay.workerLeaseSeconds:30}
  workerHeartbeatSeconds: ${event-replay.workerHeartbeatSeconds:10}
  inlinePayloadThresholdBytes: ${event-replay.inlinePayloadThresholdBytes:262144}
  maxSinglePayloadBytes: ${event-replay.maxSinglePayloadBytes:4194304}
  maxHostInlineArchiveBytes: ${event-replay.maxHostInlineArchiveBytes:536870912}
  maxHostTotalArchiveBytes: ${event-replay.maxHostTotalArchiveBytes:5368709120}
  softDatabaseArchiveBytes: ${event-replay.softDatabaseArchiveBytes:10737418240}
  hardDatabaseArchiveBytes: ${event-replay.hardDatabaseArchiveBytes:21474836480}
  softObjectStoreBacklogBytes: ${event-replay.softObjectStoreBacklogBytes:1073741824}
  hardObjectStoreBacklogBytes: ${event-replay.hardObjectStoreBacklogBytes:5368709120}
  softDeferredBytes: ${event-replay.softDeferredBytes:5368709120}
  hardDeferredBytes: ${event-replay.hardDeferredBytes:10737418240}
  softPublicationOutboxRows: ${event-replay.softPublicationOutboxRows:50000}
  hardPublicationOutboxRows: ${event-replay.hardPublicationOutboxRows:100000}
  databaseFreeSpaceWarningRatio: ${event-replay.databaseFreeSpaceWarningRatio:0.20}
  databaseFreeSpaceHardRatio: ${event-replay.databaseFreeSpaceHardRatio:0.10}
  databaseFreeSpaceHardBytes: ${event-replay.databaseFreeSpaceHardBytes:5368709120}

databaseCapacity:
  # Must resolve to the filesystem containing PostgreSQL data when capture is enabled.
  dataPath: ${EVENT_REPLAY_DATABASE_DATA_PATH:}

retentionDays:
  unresolvedPayload: ${event-replay.unresolvedPayloadRetentionDays:90}
  resolvedPayloadAfterResolution: ${event-replay.resolvedPayloadRetentionDays:14}
  failureMetadata: ${event-replay.failureMetadataRetentionDays:400}
  replayRequestItemAttempt: ${event-replay.requestRetentionDays:400}
  audit: ${event-replay.auditRetentionDays:2555}
  publishedOutbox: ${event-replay.publishedOutboxRetentionDays:7}
  terminalOutbox: ${event-replay.terminalOutboxRetentionDays:30}
  externalKafkaDlq: ${event-replay.externalKafkaDlqRetentionDays:30}

encryption:
  payloadAlgorithm: AES-256-GCM
  ivBytes: 12
  tagBits: 128
  dataKeyBytes: 32
  keyWrappingAlgorithm: AES-KW
  keyProvider: PKCS12_REPLAY_KEY_PROVIDER
  keyAliasPrefix: event-replay-kek-
  pkcs12Path: ${EVENT_REPLAY_PKCS12_PATH:}
  pkcs12Password: ${EVENT_REPLAY_PKCS12_PASSWORD:}
  activeKeyAlias: ${EVENT_REPLAY_ACTIVE_KEY_ALIAS:}

objectStore:
  provider: S3_COMPATIBLE
  endpoint: ${EVENT_REPLAY_OBJECT_ENDPOINT:}
  region: ${EVENT_REPLAY_OBJECT_REGION:}
  bucket: ${EVENT_REPLAY_OBJECT_BUCKET:}
  credentialReference: ${EVENT_REPLAY_OBJECT_CREDENTIAL_REFERENCE:}
  requiresVersioning: true
  requiresServerGeneratedKeys: true
  requiresObjectLockGovernance: true

worker:
  clientId: ${EVENT_REPLAY_WORKER_CLIENT_ID:}

operations:
  enabled: ${event-replay.operationsEnabled:false}
  refreshSeconds: ${event-replay.operationsRefreshSeconds:30}
  cleanupIntervalSeconds: ${event-replay.cleanupIntervalSeconds:300}
  cleanupBatchSize: ${event-replay.cleanupBatchSize:100}
  orphanGraceHours: ${event-replay.orphanGraceHours:24}

kafkaDlq:
  topicTemplate: "{sourceTopic}.portal-event-replay-v1.dlq"
  initialReplayGeneration: 0
  maxReplayGeneration: 0
  maxPublishAttempts: ${event-replay.maxPublishAttempts:20}
  maxPublishAgeSeconds: ${event-replay.maxPublishAgeSeconds:86400}
  publishAckTimeoutSeconds: ${event-replay.publishAckTimeoutSeconds:30}
  legacyDirectPublicationEnabled: ${event-replay.legacyDirectPublicationEnabled:true}
