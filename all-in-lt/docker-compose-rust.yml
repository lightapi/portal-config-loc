      CUSTOMER_PROFILE_CONFIG_DIR: /app/config
      CUSTOMER_PROFILE_EXTERNAL_CONFIG_DIR: /app/config-cache
      LIGHT_PORTAL_AUTHORIZATION: "${DEMO_CUSTOMER_PROFILE_API_LIGHT_PORTAL_AUTHORIZATION:-Bearer eyJhbGciOiJSUzI1NiIsImtpZCI6IkFacDAyTUN1Y3J1WmZGSmJ5eUZ3dWcifQ..AWh3_3kBiYDt2eJRnVWEl_zHOSEhLb0X8ZJWrKBwUCrUTWd8CvwfHbVlcGnPEFGIpSIpJvMIyoGXk-_PGBsTbnTPWKtT5NjFB9W2bHTgAKH3afJWtjnp08jb-tqjv0MCCTqyAmkW9eRViVptj6l13wm3EafJNGIRHk-wYUhgUx7JpPiYRb1zVnQUXjdiXVQxfh7iCHN-hRoNQDzLfOGDttR8nGAhybo6Fhnd06-EsVgITfu0B7RBy1jtifr9JG4JRCRBTbkjrb0WqBZ2HqL8tjAzWo5nzJnUU_1fC6LFDFssdSWCb9eG6Br2Zc2opgXP0lBZL_EoYLwZN_tmf0hL1w}"
      RUST_LOG: debug
      CUSTOMER_PROFILE_LOG_ANSI: "false"
    hostname: demo-customer-profile-api
    container_name: demo-customer-profile-api
    depends_on:
      controller:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8085/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  demo-offer-decision-api:
    image: ${DEMO_OFFER_DECISION_API_IMAGE:-networknt/demo-offer-decision-api:latest}
    ports:
      - 8086:8086
    volumes:
      - ./demo-offer-decision-api-rust/config:/app/config:ro
      - ./light-controller-rust/ca.pem:/keystore/ca.pem:ro
    environment:
      OFFER_DECISION_CONFIG_DIR: /app/config
      OFFER_DECISION_EXTERNAL_CONFIG_DIR: /app/config-cache
      LIGHT_PORTAL_AUTHORIZATION: "${DEMO_OFFER_DECISION_API_LIGHT_PORTAL_AUTHORIZATION:-Bearer eyJhbGciOiJSUzI1NiIsImtpZCI6IkFacDAyTUN1Y3J1WmZGSmJ5eUZ3dWcifQ..WNF_mfezFQ8I8VF-6RcHwQGPPJRKVwliOxcTPMSqz1BhpyP77-Cb2kZinuBs3LCvr0fSlHxbJeLN46o9Q7V3UD7Ig0hZEjW2oEyJMoDMhNV-rkfYpUko4nuv214WRumUrH6NndFPqTHnaZks6XDWlWRb_gkjbFZOmOzibfAB3Vemo_Pw_seVZK9-HL7mR2-5S_rBgDR4jdxA6bUSinhYqX0XSn3UW7eROCYPoaMsfRHJApwOBT2Q9bqwf8KGd5Vd-5-uH88YRk1grUj6geKughr6rzbGzDPeD77AxggQq-JIgm5YfKS3gQmmw-19rQklgYb2X32bPrQe5e_1RgXFZQ}"
      RUST_LOG: debug
      OFFER_DECISION_LOG_ANSI: "false"
    hostname: demo-offer-decision-api
    container_name: demo-offer-decision-api
    depends_on:
      controller:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8086/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  light-gateway:
    image: ${LIGHT_GATEWAY_IMAGE:-networknt/light-gateway:2.3.5}
    ports:
      - 443:8443
    volumes:
      - ./light-gateway-rust/config:/config
      - ./light-gateway-rust/lightapi/dist:/lightapi/dist
      - ./light-gateway-rust/signin/dist:/signin/dist
    environment:
      LIGHT_RS_CONFIG_DIR: /config
      STATELESSAUTH_BOOTSTRAPTOKEN: ${STATELESSAUTH_BOOTSTRAPTOKEN}
      STATELESSAUTH_GITHUBCLIENTSECRET: ${STATELESSAUTH_GITHUBCLIENTSECRET}
      STATELESSAUTH_GOOGLECLIENTSECRET: ${STATELESSAUTH_GOOGLECLIENTSECRET}
      STATELESSAUTH_FACEBOOKCLIENTSECRET: ${STATELESSAUTH_FACEBOOKCLIENTSECRET}
