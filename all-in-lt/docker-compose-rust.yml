---
x-light-portal-authorization: &light-portal-authorization "${LIGHT_PORTAL_AUTHORIZATION:-Bearer eyJhbGciOiJSUzI1NiIsImtpZCI6IkFacDAyTUN1Y3J1WmZGSmJ5eUZ3dWcifQ..PWV4SV1RFNQnZ3Dl0BVJRJE_K-EdWtVzxXdoUBRVvieUdRmS270W0J3FKNKijamWNAsH9g198NISFjhBzh4W3F5lH3VkgvoGa9Og5izR0V2BN3FhvheVXhFIdgwEgMpx-O3LCqEQjlccOiifwqkNqBaBypo9sfKY2SqunbRtHkEyMFgH-cmOCXOOdS1yWzDJnVZD5Kjdq8SMWC_0DA8LktCxR1L3ZzdzndvQig4bkgQvZTCnNdlY6zSp2PeCcR12w3Vf0jsRfAkbAKOks60DJx98r6nfY91mSLtD5q2TXH-tEh6TP6ta-k6QLW4CfBktcDD7QbJCGqL6sAxWCgImcA}"

services:

  controller:
    image: networknt/controller-rs:latest
    ports:
      - 8438:8438
    volumes:
      - ./light-controller-rust:/keystore:ro
    environment:
      CONTROLLER_ADDR: 0.0.0.0:8438
      CONTROLLER_HOST_ID: 01964b05-552a-7c4b-9184-6857e7f3dc5f
      CONTROLLER_USER_ID: 01964b05-5532-7c79-8cde-191dcbd421b8
      CONTROLLER_TLS_CERT_PATH: /keystore/server.pem
      CONTROLLER_TLS_KEY_PATH: /keystore/server.key
      CONTROLLER_TLS_TRUST_CERT_PATH: /keystore/server.pem
      DATABASE_URL: postgres://postgres:secret@postgres:5432/configserver
      DATABASE_MAXIMUM_POOL_SIZE: 3
      MICROSERVICE_JWKS_URL: https://light-oauth:6881/oauth2/AZZRJE52eXu3t1hseacnGQ/keys
      MICROSERVICE_JWKS_VERIFY_HOSTNAME: "false"
      MICROSERVICE_JWT_AUDIENCE: urn:com.networknt
      RUST_LOG: debug
      CONTROLLER_LOG_ANSI: "false"
    hostname: controller
    container_name: controller
    depends_on:
      postgres:
        condition: service_healthy
      light-oauth:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -k -f https://localhost:8438/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  light-oauth:
    image: ${LIGHT_OAUTH_IMAGE:-networknt/light-oauth:2.2.1}
    ports:
      - 6881:6881
      # - 5005:5005
    volumes:
      - ./light-oauth-rust/config:/config
    environment:
      LIGHT_RS_CONFIG_DIR: /config
      # The following environment variable will enable the debug in the container.
      RUST_LOG: debug
      OAUTH_LOG_ANSI: "false"
    # restart: on-failure
    hostname: light-oauth
    container_name: light-oauth
    depends_on:
      postgres:
        condition: service_healthy

  config-server:
    image: ${CONFIG_SERVER_IMAGE:-networknt/config-server:2.2.1}
    ports:
      - 8435:8435
    volumes:
      - ./config-server-rust/config:/config
    environment:
      LIGHT_RS_CONFIG_DIR: /config
      # The following environment variable will enable the debug in the container.
      RUST_LOG: debug
      CONFIG_LOG_ANSI: "false"
    # restart: on-failure
    hostname: config-server
    container_name: config-server
    depends_on:
      postgres:
        condition: service_healthy
      controller:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  portal-service:
    image: ${PORTAL_SERVICE_IMAGE:-networknt/portal-service:2.2.1}
    ports:
      - 2498:2498
    volumes:
      - ./portal-service-rust/config:/config
      - ${PORTAL_DATA_DIR:-./data}:/data
    environment:
      LIGHT_RS_CONFIG_DIR: /config
      # The following environment variable will enable the debug in the container.
      RUST_LOG: debug
      PORTAL_LOG_ANSI: "false"
    # restart: on-failure
    hostname: portal-service
    container_name: portal-service
    networks:
      default:
        aliases:
          - reference
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  light-workflow:
    image: ${LIGHT_WORKFLOW_IMAGE:-networknt/light-workflow:latest}
    build:
      context: ../../light-fabric
      dockerfile: apps/light-workflow/docker/Dockerfile
    ports:
      - 8080:8080
    environment:
      DATABASE_URL: postgres://postgres:secret@postgres:5432/configserver
      LIGHT_WORKFLOW_HTTP_ADDR: 0.0.0.0:8080
      RUST_LOG: light_workflow=debug,info
      WORKFLOW_LOG_ANSI: "false"
    hostname: light-workflow
    container_name: light-workflow
    depends_on:
      postgres:
        condition: service_healthy
      hybrid-command:
        condition: service_started
      hybrid-query:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  demo-customer-profile-api:
    image: ${DEMO_CUSTOMER_PROFILE_API_IMAGE:-networknt/demo-customer-profile-api:latest}
    build:
      context: ../..
      dockerfile: light-example-rs/docker/Dockerfile
      args:
        APP_NAME: demo-customer-profile-api
        APP_DIR: apps/demo-customer-profile-api
        PORT: 8085
    ports:
      - 8085:8085
    volumes:
      - ./light-controller-rust/ca.pem:/keystore/ca.pem:ro
    environment:
      LIGHT_CONFIG_SERVER_URI: ${DEMO_LIGHT_CONFIG_SERVER_URI:-https://config-server:8435}
      LIGHT_PORTAL_AUTHORIZATION: *light-portal-authorization
      STARTUP_BOOTSTRAPCACERTPATH: /keystore/ca.pem
      CLIENT_VERIFYHOSTNAME: "false"
      SERVER_SERVICEID: com.networknt.demo.customer-profile-1.0.0
      SERVER_ENVIRONMENT: demo
      SERVER_ADVERTISEDADDRESS: demo-customer-profile-api
      SERVER_HTTPPORT: 8085
      SERVER_ENABLEHTTP: "true"
      SERVER_ENABLEHTTPS: "false"
      SERVER_ENABLEREGISTRY: "true"
      SERVER_STARTONREGISTRYFAILURE: "true"
      PORTALREGISTRY_PORTALURL: https://controller:8438
      RUST_LOG: debug
      CUSTOMER_PROFILE_LOG_ANSI: "false"
    hostname: demo-customer-profile-api
    container_name: demo-customer-profile-api
    depends_on:
      controller:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8085/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  demo-offer-decision-api:
    image: ${DEMO_OFFER_DECISION_API_IMAGE:-networknt/demo-offer-decision-api:latest}
    build:
      context: ../..
      dockerfile: light-example-rs/docker/Dockerfile
      args:
        APP_NAME: demo-offer-decision-api
        APP_DIR: apps/demo-offer-decision-api
        PORT: 8086
    ports:
      - 8086:8086
    volumes:
      - ./light-controller-rust/ca.pem:/keystore/ca.pem:ro
    environment:
      LIGHT_CONFIG_SERVER_URI: ${DEMO_LIGHT_CONFIG_SERVER_URI:-https://config-server:8435}
      LIGHT_PORTAL_AUTHORIZATION: *light-portal-authorization
      STARTUP_BOOTSTRAPCACERTPATH: /keystore/ca.pem
      CLIENT_VERIFYHOSTNAME: "false"
      SERVER_SERVICEID: com.networknt.demo.offer-decision-1.0.0
      SERVER_ENVIRONMENT: demo
      SERVER_ADVERTISEDADDRESS: demo-offer-decision-api
      SERVER_HTTPPORT: 8086
      SERVER_ENABLEHTTP: "true"
      SERVER_ENABLEHTTPS: "false"
      SERVER_ENABLEREGISTRY: "true"
      SERVER_STARTONREGISTRYFAILURE: "true"
      PORTALREGISTRY_PORTALURL: https://controller:8438
      RUST_LOG: debug
      OFFER_DECISION_LOG_ANSI: "false"
    hostname: demo-offer-decision-api
    container_name: demo-offer-decision-api
    depends_on:
      controller:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8086/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  light-gateway:
    image: ${LIGHT_GATEWAY_IMAGE:-networknt/light-gateway:2.3.5}
    ports:
      - 443:8443
    volumes:
      - ./light-gateway-rust/config:/config
      - ./light-gateway-rust/lightapi/dist:/lightapi/dist
      - ./light-gateway-rust/signin/dist:/signin/dist
    environment:
      LIGHT_RS_CONFIG_DIR: /config
      STATELESSAUTH_BOOTSTRAPTOKEN: ${STATELESSAUTH_BOOTSTRAPTOKEN}
      STATELESSAUTH_GITHUBCLIENTSECRET: ${STATELESSAUTH_GITHUBCLIENTSECRET}
      STATELESSAUTH_GOOGLECLIENTSECRET: ${STATELESSAUTH_GOOGLECLIENTSECRET}
      STATELESSAUTH_FACEBOOKCLIENTSECRET: ${STATELESSAUTH_FACEBOOKCLIENTSECRET}
      LIGHT_PORTAL_AUTHORIZATION: *light-portal-authorization
      RUST_LOG: debug
      GATEWAY_LOG_ANSI: "false"
    hostname: light-gateway
    container_name: light-gateway
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
