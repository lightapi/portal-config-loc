---

services:

  controller:
    image: ${CONTROLLER_RS_IMAGE:-networknt/controller-rs:latest}
    ports:
      - 8438:8438
    volumes:
      - ./light-controller-rust:/keystore:ro,z
    environment:
      CONTROLLER_ADDR: 0.0.0.0:8438
      CONTROLLER_HOST_ID: 01964b05-552a-7c4b-9184-6857e7f3dc5f
      CONTROLLER_USER_ID: 01964b05-5532-7c79-8cde-191dcbd421b8
      CONTROLLER_TLS_CERT_PATH: /keystore/server.pem
      CONTROLLER_TLS_KEY_PATH: /keystore/server.key
      CONTROLLER_TLS_TRUST_CERT_PATH: /keystore/server.pem
      DATABASE_URL: postgres://postgres:secret@postgres:5432/configserver
      DATABASE_MAXIMUM_POOL_SIZE: 3
      MICROSERVICE_JWKS_URL: https://light-oauth:6881/oauth2/AZZRJE52eXu3t1hseacnGQ/keys
      MICROSERVICE_JWKS_VERIFY_HOSTNAME: "false"
      MICROSERVICE_JWT_AUDIENCE: urn:com.networknt
      RUST_LOG: "${RUST_LOG:-debug}"
      CONTROLLER_LOG_ANSI: "false"
    hostname: controller
    container_name: controller
    depends_on:
      postgres:
        condition: service_healthy
      light-oauth:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -k -f https://localhost:8438/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  light-oauth:
    image: ${LIGHT_OAUTH_IMAGE:-networknt/light-oauth:2.2.1}
    ports:
      - 6881:6881
      # - 5005:5005
    volumes:
      - ./light-oauth-rust/config:/config:Z
    environment:
      LIGHT_RS_CONFIG_DIR: /config
      # The following environment variable will enable the debug in the container.
      RUST_LOG: "${RUST_LOG:-debug}"
      OAUTH_LOG_ANSI: "false"
    # restart: on-failure
    hostname: light-oauth
    container_name: light-oauth
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "printf 'GET /oauth2/AZZRJE52eXu3t1hseacnGQ/keys HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' | timeout 5 openssl s_client -connect localhost:6881 -servername localhost -quiet 2>/dev/null | grep -q 'HTTP/1.1 200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  config-server:
    image: ${CONFIG_SERVER_IMAGE:-networknt/config-server:2.2.1}
    ports:
      - 8435:8435
    volumes:
      - ./config-server-rust/config:/config:Z
    environment:
      LIGHT_RS_CONFIG_DIR: /config
      # The following environment variable will enable the debug in the container.
      RUST_LOG: "${RUST_LOG:-debug}"
      CONFIG_LOG_ANSI: "false"
    # restart: on-failure
    hostname: config-server
    container_name: config-server
    depends_on:
      postgres:
        condition: service_healthy
      light-oauth:
        condition: service_healthy
      controller:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  portal-service:
    image: ${PORTAL_SERVICE_IMAGE:-networknt/portal-service:2.2.1}
    ports:
      - 2498:2498
    volumes:
      - ./portal-service-rust/config:/config:Z
      - ${PORTAL_DATA_DIR:-./data}:/data
    environment:
      LIGHT_RS_CONFIG_DIR: /config
      # The following environment variable will enable the debug in the container.
      RUST_LOG: "${RUST_LOG:-debug}"
      PORTAL_LOG_ANSI: "false"
    # restart: on-failure
    hostname: portal-service
    container_name: portal-service
    networks:
      default:
        aliases:
          - reference
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  light-workflow:
    image: ${LIGHT_WORKFLOW_IMAGE:-networknt/light-workflow:latest}
    ports:
      - 8436:8436
    env_file:
      - ./light-workflow-rust/config/light-workflow.env
    environment:
      LIGHT_PORTAL_AUTHORIZATION: "${LIGHT_WORKFLOW_LIGHT_PORTAL_AUTHORIZATION:-Bearer eyJhbGciOiJSUzI1NiIsImtpZCI6IkFacDAyTUN1Y3J1WmZGSmJ5eUZ3dWcifQ..bPDJLqUkODxQkIYeNN89t7fEjg2s_wEcHD6iY6ogVTNLCt_-mv_jmRyQ_aQZxnH9AzmzlO8xdQLjJeXQ2LvzpbNU7diuQyDDDkhYU-25b10tJWZ30eDOZ8xiTqMp3Yrt9heT_H6yXXLIXugmBVJR3-mdTXvoPUyhzDMz_Zwu-vtYKQaFPcog8H9K92Wk3uut4l0iKinCPob4LQJF7nxtjXZkWOJkWao9qLax000i2JstSexpzROTRMVVQZsqevLTZ0R0MEkFEQUUB2PfrmUNj3RzTS3xqUrbO9t6l5JPHfSuHjxQ330PIRqxIkX5wOZnxKoQkwOcsFLTVybMtvPgrA}"
      RUST_LOG: "${RUST_LOG:-light_workflow=debug,info}"
    hostname: light-workflow
    container_name: light-workflow
    depends_on:
      postgres:
        condition: service_healthy
      hybrid-command:
        condition: service_started
      hybrid-query:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  demo-customer-profile-api:
    image: ${DEMO_CUSTOMER_PROFILE_API_IMAGE:-networknt/demo-customer-profile-api:0.1.0}
    ports:
      - 8085:8085
    volumes:
      - ./demo-customer-profile-api-rust/config:/app/config:ro,Z
      - ./light-controller-rust/ca.pem:/keystore/ca.pem:ro,z
    environment:
      CUSTOMER_PROFILE_CONFIG_DIR: /app/config
      CUSTOMER_PROFILE_EXTERNAL_CONFIG_DIR: /app/config-cache
      LIGHT_PORTAL_AUTHORIZATION: "${DEMO_CUSTOMER_PROFILE_API_LIGHT_PORTAL_AUTHORIZATION:-Bearer eyJhbGciOiJSUzI1NiIsImtpZCI6IkFacDAyTUN1Y3J1WmZGSmJ5eUZ3dWcifQ..oLyWqWjuHhC3UBdUOdchTByxvXo0gUoYsfq5G3E-Us3zkd8vOTxU195GJ-C2BK9meYuc5dsTTiJIwl-GjY_NDIocncPQG5wAy3YEnDP5z9cDvbfQQqSpQS5O7vgftAWe56Nl5CY9_BK4turOrnX8Li3KqDofm3HXFvsePrI4hHXLbEMnaSid10TqahH_NIoyQnjpvKgAWgnz5KwhZ-FvdqGkD3J3MsyyovVMz58btpwRbvhwrYpmT5rX2Su036lXwt68LIwkGTd_EaSYC-FaoCNHYzNt3rSuNngDSCtUU8SiIBC_Nxj6ZgFYlctTc3J0kVBcPVEcvQ8Lyl_PzrjfPA}"
      RUST_LOG: "${RUST_LOG:-debug}"
      CUSTOMER_PROFILE_LOG_ANSI: "false"
    hostname: demo-customer-profile-api
    container_name: demo-customer-profile-api
    depends_on:
      controller:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8085/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  demo-offer-decision-api:
    image: ${DEMO_OFFER_DECISION_API_IMAGE:-networknt/demo-offer-decision-api:0.1.0}
    ports:
      - 8086:8086
    volumes:
      - ./demo-offer-decision-api-rust/config:/app/config:ro,Z
      - ./light-controller-rust/ca.pem:/keystore/ca.pem:ro,z
    environment:
      OFFER_DECISION_CONFIG_DIR: /app/config
      OFFER_DECISION_EXTERNAL_CONFIG_DIR: /app/config-cache
      LIGHT_PORTAL_AUTHORIZATION: "${DEMO_OFFER_DECISION_API_LIGHT_PORTAL_AUTHORIZATION:-Bearer eyJhbGciOiJSUzI1NiIsImtpZCI6IkFacDAyTUN1Y3J1WmZGSmJ5eUZ3dWcifQ..lGVc5FRkisW4la8IT531zTVIboBVyaRXZ1SEQ2NH-z8Qh90G94otKXrKwAIFMK_4rWKqRxr-iCD04M6HtH-mM6v45b99EUS__MNQqkJ1mCzdikmoijg9lgtBvSxRaJzYWCJm0aRFm2Nv-ObOcTOnWzYbFpsTH90q-QkuS8PATIMAEgJ3fA_zMUWpJIzE7Zm24hDnOYk_5xqrWFV7TFDYtqv-8IxQ2NIWTvwIs4Kxnq7vssUb1P6qQ6ygxSjNUQ_QW5pvyVm1D5udNEAmulUFzk6o9T4lPowYJt_H_nOKnneVsiqr12TPj4CpWHaM86bZnIhrn6cXqUQGSzpw0V19Iw}"
      RUST_LOG: "${RUST_LOG:-debug}"
      OFFER_DECISION_LOG_ANSI: "false"
    hostname: demo-offer-decision-api
    container_name: demo-offer-decision-api
    depends_on:
      controller:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8086/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  demo-insurance-claim-mcp-server:
    image: ${DEMO_INSURANCE_CLAIM_MCP_SERVER_IMAGE:-networknt/demo-insurance-claim-mcp-server:latest}
    ports:
      - 8087:8087
    volumes:
      - ./demo-insurance-claim-mcp-server-rust/config:/app/config:ro,Z
      - ./light-controller-rust/ca.pem:/keystore/ca.pem:ro,z
    environment:
      INSURANCE_CLAIM_MCP_CONFIG_DIR: /app/config
      INSURANCE_CLAIM_MCP_EXTERNAL_CONFIG_DIR: /app/config-cache
      LIGHT_PORTAL_AUTHORIZATION: "${DEMO_INSURANCE_CLAIM_MCP_LIGHT_PORTAL_AUTHORIZATION:-Bearer eyJhbGciOiJSUzI1NiIsImtpZCI6IkFacDAyTUN1Y3J1WmZGSmJ5eUZ3dWcifQ..U2QrwSdmBe4seetd5e3LE9J1NiesOACkYAS-Qa4bqJDhvbS1WkaM4Na3yGL0mkdghGQlwWW2jK26HZKk3TmjVdeyGFpM6eAWKfOCIkqYxYoimRfb4TkHyZdz4DihhGmy6_PZpPuAUBrWbsHmQOeliXeh6VhMG3jQT5VG0jNykFA2hYFHl3yHiWKJmuIY5lKqdr0b3oMY42g9NvcDA1Y889EDF1f8r6kocdE0c4c_GWMIbnFzTBEf5JmjJ4pKswCrS9CmIMEOyL8pTrdOy3R2zn_TX_R-Hw2xoeSwpt6Q9_Vy_SE1qNvm2ZKAX1prn-PcYm4Q5oEfCjBqpbPvwObNeA}"
      RUST_LOG: "${RUST_LOG:-debug}"
      INSURANCE_CLAIM_MCP_LOG_ANSI: "false"
    hostname: demo-insurance-claim-mcp-server
    container_name: demo-insurance-claim-mcp-server
    depends_on:
      controller:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8087/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  light-gateway:
    image: ${LIGHT_GATEWAY_IMAGE:-networknt/light-gateway:2.3.5}
    ports:
      - "${LIGHT_GATEWAY_HOST_PORT:-443}:8443"
    volumes:
      - ./light-gateway-rust/config:/config:Z
      - ./light-gateway-rust/lightapi/dist:/lightapi/dist:Z
      - ./light-gateway-rust/signin/dist:/signin/dist:Z
    environment:
      LIGHT_RS_CONFIG_DIR: /config
      # ACCESS_CONTROL_ENABLED: "false"
      CLIENT_VERIFYHOSTNAME: "false"
      CLIENT_CACERTPATH: /config/ca.pem
      STATELESSAUTH_BOOTSTRAPTOKEN: ${STATELESSAUTH_BOOTSTRAPTOKEN}
      STATELESSAUTH_GITHUBCLIENTSECRET: ${STATELESSAUTH_GITHUBCLIENTSECRET}
      STATELESSAUTH_GOOGLECLIENTSECRET: ${STATELESSAUTH_GOOGLECLIENTSECRET}
      STATELESSAUTH_FACEBOOKCLIENTSECRET: ${STATELESSAUTH_FACEBOOKCLIENTSECRET}
      LIGHT_PORTAL_AUTHORIZATION: "${LIGHT_GATEWAY_LIGHT_PORTAL_AUTHORIZATION:-Bearer eyJhbGciOiJSUzI1NiIsImtpZCI6IkFacDAyTUN1Y3J1WmZGSmJ5eUZ3dWcifQ..CxR175PdsizO1mLtV7f_lPxyLhdlmOmNy80InIHH-R-FlIsDiGXVzjlqn6b3h_gI_v-st0r4vQPXUxotDBNSbyStXUq1HZDdBS_7O15f7VgCbK95re909BC06Qm4uSgPs9F6IB_LfVjwxkJ5nxKg2geXJ6SgQ_m0Ux1Kyeku-ctx6FT-0t50SJZIMaZ73J3oiXuFgbj37fEXxCUZmpibsoLeLALvPUYWseZZNiJ1nBOOPWrPtDdvqIrUJQntL1jrbuAQuRvtORYNYRAG9Ju4QCIv1G8_GhLHSt18EoIMa5WkZUsC73KheAKLYUzhiDcPvb-Nv4jnwMzoNdPBD1mlMA}"
      RUST_LOG: "${RUST_LOG:-debug}"
      GATEWAY_LOG_ANSI: "false"
    hostname: light-gateway
    container_name: light-gateway
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy

  light-agent:
    image: ${LIGHT_AGENT_IMAGE:-networknt/light-agent:latest}
    ports:
      - ${LIGHT_AGENT_PORT:-8083}:8083
    volumes:
      - ./light-agent-rust/config:/config:ro,Z
      - ./light-controller-rust/ca.pem:/keystore/ca.pem:ro,z
    environment:
      LIGHT_RS_CONFIG_DIR: /config
      DATABASE_URL: postgres://postgres:secret@postgres:5432/configserver
      LIGHT_PORTAL_AUTHORIZATION: "${LIGHT_AGENT_LIGHT_PORTAL_AUTHORIZATION:-Bearer eyJraWQiOiJBWnAwMk1DdWNydVpmRkpieXlGd3VnIiwiYWxnIjoiUlMyNTYifQ..XcZEkr_fD1U3IWRYs9BS7aYVlcrj7zlayPjZ8s9_5MCTN2CYwIMuW1t_a7U_eRUTn3UtjRbV0v7tKBZ53sDIKbn3de6RJ4o_Iynf2_WX-yHEoggljkF-blIo8HarF1sn_v4Fp1eEh7V8m6D_lHC9FVkkIFDSvKl5GPAgjd9-dq8AkIkOGJ26IAOeuiKIskpUNkCmu6wahGInDYdsYk0GTydLu2jYIkhcPOoAOgFpQXBIPVXFZ8C1CRpPw39gfPyyATP_1qh2iGXlfSGTJiIp0pb9EXLIVcexPhdGh_LhSkrOMDUqxme5HC94T9do8yPQGzgfNFPcLywVeTgEco4bBQ}"
      LIGHT_AGENT_HOST_ID: "${LIGHT_AGENT_HOST_ID:-01964b05-552a-7c4b-9184-6857e7f3dc5f}"
      LIGHT_AGENT_AGENT_DEF_ID: "${LIGHT_AGENT_AGENT_DEF_ID:-}"
      CODEX_API_KEY: "${CODEX_API_KEY:-}"
      CODEX_ACCOUNT_ID: "${CODEX_ACCOUNT_ID:-}"
      CODEX_REASONING_EFFORT: "${CODEX_REASONING_EFFORT:-low}"
      LIGHT_AGENT_MODEL: "${LIGHT_AGENT_MODEL:-gpt-5.5}"
      LIGHT_AGENT_TEMPERATURE: "${LIGHT_AGENT_TEMPERATURE:-0.7}"
      RUST_LOG: "${LIGHT_AGENT_RUST_LOG:-info}"
      AGENT_LOG_ANSI: "false"
    hostname: light-agent
    container_name: light-agent
    depends_on:
      postgres:
        condition: service_healthy
      controller:
        condition: service_healthy
      config-server:
        condition: service_healthy
      hybrid-query:
        condition: service_started
      light-gateway:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
