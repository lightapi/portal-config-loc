---
# Start with Java services:
#   docker compose -f docker-compose.yml -f docker-compose-java.yml up -d
#
# Start with Rust services:
#   LIGHT_GATEWAY_IMAGE=networknt/light-gateway:2.3.5 docker compose -f docker-compose.yml -f docker-compose-rust.yml up -d
#
# Keep the service names as "controller", "config-server", "light-oauth",
# "portal-service", and "light-gateway" so downstream services do not need to
# change.
services:

  postgres:
    # image: timescale/timescaledb:latest-pg18
    image: timescale/timescaledb:latest-pg17
    # image: postgres:17.2
    volumes:
      # - ./postgres-db/pgdata:/var/lib/postgresql/pgdata
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro,Z
    environment:
      POSTGRES_PASSWORD: secret
    command: postgres -c wal_level=logical -c max_replication_slots=10 -c max_wal_senders=10
    ports:
      - 5432:5432
    hostname: postgres
    container_name: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  hybrid-command:
    image: ${PORTAL_HYBRID_COMMAND_IMAGE:-networknt/portal-hybrid-command:2.2.1}
    environment:
      NOREPLAY_EMAIL_PASSWORD: ${NOREPLAY_EMAIL_PASSWORD}
      # The following environment varialbe will enable the debug in the container.
      # JAVA_TOOL_OPTIONS: '-agentlib:jdwp=transport=dt_socket,server=y,suspend=y,address=*:5005'
    volumes:
      - ./hybrid-command/config:/config:Z
      - ./hybrid-command/service:/service:Z
      - ${PORTAL_DATA_DIR:-./data}:/data:z
    ports:
      - 8439:8439
      # The debug port
      # - 5005:5005
    # restart: on-failure
    hostname: hybrid-command
    container_name: hybrid-command
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy

  hybrid-query:
    image: ${PORTAL_HYBRID_QUERY_IMAGE:-networknt/portal-hybrid-query:2.2.1}
    volumes:
      - ./hybrid-query/node1:/config:Z
      - ./hybrid-query/service:/service:Z
      - ${PORTAL_DATA_DIR:-./data}:/data:z
    ports:
      - 8440:8440
    # restart: on-failure
    environment:
      embedding-task.enabled: ${EMBEDDING_TASK_ENABLED:-false}
      embedding-task.provider: ${EMBEDDING_TASK_PROVIDER:-disabled}
      embedding-task.endpoint: ${EMBEDDING_TASK_ENDPOINT:-https://generativelanguage.googleapis.com/v1beta/openai/embeddings}
      embedding-task.model: ${EMBEDDING_TASK_MODEL:-gemini-embedding-001}
      embedding-task.dimension: ${EMBEDDING_TASK_DIMENSION:-384}
      embedding-task.apiKey: ${GEMINI_API_KEY:-}
      JAVA_TOOL_OPTIONS: "-Djdk.internal.httpclient.disableHostnameVerification=true"
    hostname: hybrid-query
    container_name: hybrid-query
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy

volumes:
  postgres-data:
