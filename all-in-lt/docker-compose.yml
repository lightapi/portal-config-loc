---
# Start with Java services:
#   docker compose -f docker-compose.yml -f docker-compose-java.yml up -d
#
# Start with Rust services:
#   CONTROLLER_RS_IMAGE=<rust-controller-image> docker compose -f docker-compose.yml -f docker-compose-rust.yml up -d
#
# Keep the service names as "controller", "config-server", "light-oauth", and "portal-service"
# so downstream services do not need to change.
services:

  postgres:
    # image: timescale/timescaledb:latest-pg18
    image: timescale/timescaledb:latest-pg17
    # image: postgres:17.2
    volumes:
      # - ./postgres-db/pgdata:/var/lib/postgresql/pgdata
      - ./postgres-db/data:/var/lib/postgresql/data
      - ./postgres-db/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_PASSWORD: secret
    command: postgres -c wal_level=logical -c max_replication_slots=10 -c max_wal_senders=10
    ports:
      - 5432:5432
    hostname: postgres
    container_name: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  hybrid-command:
    image: networknt/portal-hybrid-command:2.2.1
    environment:
      NOREPLAY_EMAIL_PASSWORD: ${NOREPLAY_EMAIL_PASSWORD}
      # The following environment varialbe will enable the debug in the container.
      # JAVA_TOOL_OPTIONS: '-agentlib:jdwp=transport=dt_socket,server=y,suspend=y,address=*:5005'
    volumes:
      - ./hybrid-command/config:/config
      - ./hybrid-command/service:/service
      - /home/steve/data:/data
    ports:
      - 8439:8439
      # The debug port
      # - 5005:5005
    # restart: on-failure
    hostname: hybrid-command
    container_name: hybrid-command
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy

  hybrid-query:
    image: networknt/portal-hybrid-query:2.2.1
    volumes:
      - ./hybrid-query/node1:/config
      - ./hybrid-query/service:/service
      - /home/steve/data:/data
    ports:
      - 8440:8440
    # restart: on-failure
    environment:
      JAVA_TOOL_OPTIONS: "-Djdk.internal.httpclient.disableHostnameVerification=true"
    hostname: hybrid-query
    container_name: hybrid-query
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy

  light-gateway:
    image: networknt/light-gateway:2.2.1
    ports:
      - 443:8443
      # - 5005:5005
    volumes:
      - ./light-gateway/config:/config
      - ./light-gateway/lightapi/dist:/lightapi/dist
      - ./light-gateway/signin/dist:/signin/dist
    environment:
      STATELESSAUTH_BOOTSTRAPTOKEN: ${STATELESSAUTH_BOOTSTRAPTOKEN}
      STATELESSAUTH_GITHUBCLIENTSECRET: ${STATELESSAUTH_GITHUBCLIENTSECRET}
      STATELESSAUTH_GOOGLECLIENTSECRET: ${STATELESSAUTH_GOOGLECLIENTSECRET}
      STATELESSAUTH_FACEBOOKCLIENTSECRET: ${STATELESSAUTH_FACEBOOKCLIENTSECRET}
      JAVA_TOOL_OPTIONS: "-Djdk.internal.httpclient.disableHostnameVerification=true"
      # The following environment varialbe will enable the debug in the container.
      # JAVA_TOOL_OPTIONS: '-agentlib:jdwp=transport=dt_socket,server=y,suspend=y,address=*:5005'
      # JAVA_TOOL_OPTIONS: "-Djavax.net.debug=all"
    hostname: light-gateway
    container_name: light-gateway
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy

    # network_mode: host
